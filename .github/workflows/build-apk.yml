name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch: # permite rodar manualmente pelo site do GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configura Node.js
      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. Configura Java 17 (necessário para o Gradle/Android)
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Instala dependências do projeto
      - name: Instalar dependências npm
        run: npm install

      # 5. Injeta a chave da API do YouTube (salva nos Secrets do GitHub)
      - name: Injetar YouTube API Key
        run: |
          sed -i "s/SUA_CHAVE_API_AQUI/${{ secrets.YOUTUBE_API_KEY }}/g" src/utils/youtubeApi.ts

      # 6. Permissão de execução para o Gradle
      - name: Permissão Gradle
        run: chmod +x android/gradlew

      # 7. Cache do Gradle para acelerar builds futuros
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 8. Compila o APK de release
      - name: Build APK Release
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      # 9. Disponibiliza o APK para download
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YTunes-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # 10. Mostra o tamanho do APK gerado
      - name: Info do APK
        run: |
          echo "✅ APK gerado com sucesso!"
          ls -lh android/app/build/outputs/apk/release/app-release.apk
