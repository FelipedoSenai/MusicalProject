name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependências
        run: npm install

      - name: Injetar YouTube API Key
        run: |
          sed -i "s/SUA_CHAVE_API_AQUI/${{ secrets.YOUTUBE_API_KEY }}/g" src/utils/youtubeApi.ts

      - name: Criar estrutura android manualmente
        run: |
          mkdir -p android/app/src/main/res
          mkdir -p android/gradle/wrapper

          # gradle-wrapper.properties
          cat > android/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # Baixar gradlew real do GitHub
          curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradlew -o android/gradlew
          chmod +x android/gradlew

          # build.gradle raiz
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext {
                  buildToolsVersion = "34.0.0"
                  minSdkVersion = 21
                  compileSdkVersion = 34
                  targetSdkVersion = 34
                  ndkVersion = "25.1.8937393"
                  kotlinVersion = "1.9.22"
              }
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.1.4")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
              }
          }
          EOF

          # settings.gradle
          cat > android/settings.gradle << 'EOF'
          rootProject.name = 'YTunes'
          include ':app'
          EOF

          # app/build.gradle
          cat > android/app/build.gradle << 'EOF'
          apply plugin: "com.android.application"
          android {
              namespace "com.ytunes.app"
              compileSdkVersion rootProject.ext.compileSdkVersion
              defaultConfig {
                  applicationId "com.ytunes.app"
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
                  }
              }
          }
          dependencies {
              implementation "com.facebook.react:react-android"
              implementation "com.facebook.react:hermes-android"
          }
          EOF

          # AndroidManifest
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.WAKE_LOCK" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <application
              android:name=".MainApplication"
              android:label="YTunes"
              android:allowBackup="false"
              android:theme="@style/AppTheme"
              android:hardwareAccelerated="true">
              <activity
                android:name=".MainActivity"
                android:label="YTunes"
                android:configChanges="keyboard|keyboardHidden|orientation|screenLayout|screenSize|uiMode"
                android:launchMode="singleTask"
                android:windowSoftInputMode="adjustResize"
                android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          echo "✅ Estrutura android criada com sucesso"
          ls -la android/
          ls -la android/gradle/wrapper/

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YTunes-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
